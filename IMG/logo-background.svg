<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
    <style>
        .bg { fill: #1c1c1c; }
        .title { fill: #F5F5F5; font-family: 'DM Sans', Arial, sans-serif; font-size: 64px; font-weight: 600; letter-spacing: 2px; }
        .subtitle { fill: #3B82F6; font-family: 'DM Sans', Arial, sans-serif; font-size: 20px; letter-spacing: 6px; }
        .icon { fill: #3B82F6; font-size: 40px; font-family: monospace; }
    </style>

    <!-- Background -->
    <rect class="bg" width="100%" height="100%" rx="10"/>

    <!-- Code Icon -->
    <text x="50%" y="90" text-anchor="middle" class="icon">&lt;/&gt;</text>

    <!-- Main Title -->
    <text x="50%" y="160" text-anchor="middle" class="title">
        SHERLOG OLMS
    </text>

    <!-- Subtitle -->
    <text x="50%" y="210" text-anchor="middle" class="subtitle">
        WEB DEVELOPER
    </text>
</svg>
