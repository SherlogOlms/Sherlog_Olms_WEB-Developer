<svg width="600" height="250" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title 
    { 
      fill: #eaeaea;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 60px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .subtitle
    { 
      fill: #4da3ff; 
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight:500;
    }
